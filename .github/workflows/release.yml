name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Run tests before building ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  # ── Build executables (parallel across platforms) ─────────────────────────
  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            binary: spacewar
            archive: spacewar-linux.tar.gz

          - os: windows-latest
            label: windows
            binary: spacewar.exe
            archive: spacewar-windows.zip

          - os: macos-latest
            label: macos
            binary: spacewar
            archive: spacewar-macos.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --windowed
          --name spacewar
          --paths src
          launcher.py

      - name: Archive (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czf ../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive }}

  # ── Create GitHub Release and attach all three archives ───────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "SpaceWar $TAG" \
            --generate-notes \
            artifacts/linux/spacewar-linux.tar.gz \
            artifacts/windows/spacewar-windows.zip \
            artifacts/macos/spacewar-macos.tar.gz

  # ── Push to itch.io via butler ────────────────────────────────────────────
  itch:
    needs: build
    runs-on: ubuntu-latest
    env:
      ITCH_PROJECT: peteclarkez/spacewar
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install butler
        uses: josephbisch/setup-butler@v1

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          TAG="${{ github.ref_name }}"
          butler push artifacts/linux/spacewar-linux.tar.gz   $ITCH_PROJECT:linux   --userversion "$TAG"
          butler push artifacts/windows/spacewar-windows.zip  $ITCH_PROJECT:windows --userversion "$TAG"
          butler push artifacts/macos/spacewar-macos.tar.gz   $ITCH_PROJECT:macos   --userversion "$TAG"
